name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build (CLI + GUI)
        run: cargo build --release --features gui

      - name: Bundle dist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target/release/transcribe.exe dist/
          Copy-Item target/release/transcribe-gui.exe dist/
          Copy-Item README.md dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcribe-windows-x64
          path: dist/

      - name: Attach to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/transcribe.exe
            dist/transcribe-gui.exe
